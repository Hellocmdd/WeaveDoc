name: CI

on:
  push:
    branches: [ feature/weavedoc-simple-rag-demo ]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet: [10.0.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.sln
            **/packages.lock.json

      - name: .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore test.sln

      - name: Build (Release)
        run: dotnet build test.sln --configuration Release --no-restore /p:ContinuousIntegrationBuild=true
