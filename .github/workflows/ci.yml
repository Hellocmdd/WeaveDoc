name: CI

on:
  push:
    branches: [ feature/weavedoc-simple-rag-demo ]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet: [10.0.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ matrix.dotnet }}
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.sln
            **/*.slnx
            **/packages.lock.json

      - name: .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore WeaveDoc.slnx

      - name: Build (Release)
        run: dotnet build WeaveDoc.slnx --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Test RAG
        run: dotnet test tests/WeaveDoc.Rag.Tests/WeaveDoc.Rag.Tests.csproj --configuration Release --no-build -nologo

      - name: Test Converter
        if: matrix.os == 'ubuntu-latest'
        run: dotnet test tests/WeaveDoc.Converter.Tests/WeaveDoc.Converter.Tests.csproj --configuration Release -nologo
