<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PDF Viewer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        #pdfFrame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="pdfFrame"></iframe>
    
    <script>
        // 从URL参数获取PDF路径
        const params = new URLSearchParams(window.location.search);
        const pdfUrl = params.get('pdf');
        
        if (pdfUrl) {
            document.getElementById('pdfFrame').src = './pdfjs-5.7.284-dist/web/viewer.html?file=' + encodeURIComponent(decodeURIComponent(pdfUrl));
        }
        
        // 接收来自C#的消息
        window.chrome?.webview?.addEventListener('message', (event) => {
            if (event.data?.type === 'loadPdf' && event.data.url) {
                document.getElementById('pdfFrame').src = './pdfjs-5.7.284-dist/web/viewer.html?file=' + encodeURIComponent(event.data.url);
            }
        });
    </script>
</body>
</html>
