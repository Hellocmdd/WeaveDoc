<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PDF Viewer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: white;
        }
        #pdfContainer {
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div id="pdfContainer">
        <iframe id="pdfFrame" src="" frameborder="0"></iframe>
    </div>
    <script>
        function loadPdf(url) {
            const frame = document.getElementById('pdfFrame');
            // 添加参数禁用工具栏
            const toolbarDisabledUrl = url + '#toolbar=0&navpanes=0&scrollbar=1';
            frame.src = toolbarDisabledUrl;
            console.log('Loading PDF:', toolbarDisabledUrl);
        }
        
        window.chrome.webview.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'loadPdf') {
                loadPdf(event.data.url);
            }
        });
    </script>
</body>
</html>
