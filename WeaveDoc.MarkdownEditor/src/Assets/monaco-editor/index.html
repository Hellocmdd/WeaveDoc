<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco Editor</title>
    <link rel="stylesheet" href="style.css">
    <!-- 加载本地的 loader.js -->
    <script src="min/vs/loader.js"></script>
</head>
<body>
    <div id="editor"></div>
    <script>
        // 配置 RequireJS 指向本地的 vs 文件夹
        require.config({ paths: { 'vs': './min/vs' }});

        require(['vs/editor/editor.main'], function() {
            // 初始化编辑器
            var editor = monaco.editor.create(document.getElementById('editor'), {
                value: '# Hello WeaveDoc!\n\nStart typing markdown here...',
                language: 'markdown',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                fontSize: 14,
                lineNumbers: 'on',
                wordWrap: 'on'
            });

            // 监听内容变化并发送给 C#
            editor.onDidChangeModelContent(function() {
                try {
                    var content = editor.getValue();
                    if (window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage(JSON.stringify({ Type: 'contentChanged', Data: content }));
                    }
                } catch (e) {
                    console.error(e);
                }
            });

            // 监听来自 C# 的消息
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.addEventListener('message', function(e) {
                    try {
                        var msg = e.data;
                        if (typeof msg === 'string') {
                            try { msg = JSON.parse(msg); } catch {}
                        }
                        if (msg && msg.Type === 'setContent') {
                            var current = editor.getValue();
                            if (current !== msg.Data) {
                                editor.setValue(msg.Data || '');
                            }
                        }
                    } catch (err) { console.error(err); }
                });
            }
            
            console.log("Monaco Editor Loaded Successfully");
        });
    </script>
</body>
</html>
