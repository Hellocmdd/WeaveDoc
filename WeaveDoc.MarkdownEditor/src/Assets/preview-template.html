<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            padding: 16px;
            margin: 0;
            background-color: #ffffff;
            color: #333333;
        }
        h1, h2, h3 { color: #222; margin-top: 20px; }
        h1 { font-size: 28px; border-bottom: 2px solid #eaecef; }
        h2 { font-size: 24px; border-bottom: 1px solid #eaecef; }
        code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; }
        pre { background: #f6f8fa; padding: 12px; border-radius: 6px; overflow-x: auto; }
        blockquote { border-left: 4px solid #dfe2e5; color: #6a737d; padding-left: 16px; }
        a { color: #0366d6; text-decoration: none; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #dfe2e5; padding: 8px 12px; text-align: left; }
        th { background: #f6f8fa; }
        img { max-width: 100%; }
    </style>
</head>
<body>
    <h1>Welcome to WeaveDoc</h1>
    <p>This is a preview of your markdown content.</p>
    <h2>Features</h2>
    <ul>
        <li>Real-time markdown preview</li>
        <li>Syntax highlighting</li>
        <li>Easy to use</li>
    </ul>
</body>
</html>
