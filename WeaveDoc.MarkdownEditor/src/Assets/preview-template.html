<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: auto; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-size: 14px; line-height: 1.4; color: #333; background-color: #ffffff; padding: 12px; overflow-wrap: break-word; }
        h1, h2, h3, h4, h5, h6 { font-weight: 600; margin-top: 12px; margin-bottom: 8px; line-height: 1.3; }
        h1 { font-size: 1.5em; border-bottom: 1px solid #eee; padding-bottom: 0.2em; }
        h2 { font-size: 1.25em; border-bottom: 1px solid #eee; padding-bottom: 0.2em; }
        h3 { font-size: 1.1em; }
        h4 { font-size: 1em; }
        p { margin-top: 0; margin-bottom: 8px; }
        ul, ol { padding-left: 1.5em; margin-top: 0; margin-bottom: 8px; }
        li { margin-top: 2px; }
        code { font-family: 'Fira Code', 'Monaco', 'Consolas', monospace; font-size: 85%; padding: 0.15em 0.3em; background-color: rgba(27, 31, 35, 0.05); border-radius: 2px; }
        pre { padding: 12px; overflow: auto; font-size: 85%; line-height: 1.4; background-color: #f6f8fa; border-radius: 3px; margin-bottom: 8px; }
        pre code { padding: 0; background-color: transparent; border-radius: 0; }
        blockquote { margin: 4px 0 8px 0; padding: 4px 12px; color: #6a737d; border-left: 3px solid #dfe2e5; background-color: #f8f9fa; }
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        hr { height: 1px; padding: 0; margin: 12px 0; background-color: #e1e4e8; border: 0; }
        table { border-spacing: 0; border-collapse: collapse; margin-bottom: 8px; width: 100%; font-size: 13px; }
        table th, table td { padding: 4px 8px; border: 1px solid #dfe2e5; }
        table th { font-weight: 600; background-color: #f6f8fa; }
        table tr:nth-child(2n) { background-color: #f6f8fa; }
        img { max-width: 100%; box-sizing: content-box; }
        #content { min-height: 100%; }
        [data-line] { cursor: pointer; }
        [data-line]:hover { background-color: rgba(0, 102, 214, 0.1); }
        [data-pos] { cursor: pointer; }
        .highlight-char { background-color: rgba(255, 193, 7, 0.4) !important; border-radius: 2px; }
    </style>
</head>
<body>
    <div id='content'>Welcome to WeaveDoc Preview</div>
    <script>
        window.updateContent = function(html) {
            var contentDiv = document.getElementById('content');
            if (contentDiv) {
                contentDiv.innerHTML = html;
                var posElements = contentDiv.querySelectorAll('[data-pos]');
                for (var i = 0; i < posElements.length; i++) {
                    posElements[i].addEventListener('click', function(e) {
                        e.stopPropagation();
                        var posAttr = this.getAttribute('data-pos');
                        if (posAttr) {
                            var parts = posAttr.split('-');
                            var lineNumber = parseInt(parts[0], 10) || 1;
                            var colNumber = parseInt(parts[1], 10) || 1;
                            clearHighlight();
                            sendClickMessage(lineNumber, colNumber);
                        }
                    });
                }
            }
        };

        document.addEventListener('click', function(e) {
            var target = e.target;
            while (target && target !== document.body) {
                if (target.hasAttribute && target.hasAttribute('data-pos')) {
                    var posAttr = target.getAttribute('data-pos');
                    if (posAttr) {
                        var parts = posAttr.split('-');
                        var lineNumber = parseInt(parts[0], 10) || 1;
                        var colNumber = parseInt(parts[1], 10) || 1;
                        sendClickMessage(lineNumber, colNumber);
                    }
                    return;
                }
                if (target.hasAttribute && target.hasAttribute('data-line')) {
                    var lineNumber = parseInt(target.getAttribute('data-line'), 10) || 1;
                    sendClickMessage(lineNumber, 1);
                    return;
                }
                target = target.parentNode;
            }
        }, true);

        function sendClickMessage(line, column) {
            var clickData = JSON.stringify({ Type: 'previewClick', Data: JSON.stringify({ line: line, column: column }) });
            if (window.external && typeof window.external.invoke === 'function') {
                window.external.invoke(clickData);
            } else if (window.chrome && window.chrome.webview && typeof window.chrome.webview.postMessage === 'function') {
                window.chrome.webview.postMessage({ Type: 'previewClick', Data: JSON.stringify({ line: line, column: column }) });
            }
        }

        function clearHighlight() {
            var highlighted = document.querySelectorAll('.highlight-char');
            highlighted.forEach(function(el) {
                el.classList.remove('highlight-char');
            });
        }

        window.scrollToLine = function(lineNumber) {
            try {
                clearHighlight();
                var targetLine = lineNumber;
                var allElements = document.querySelectorAll('[data-pos]');
                for (var i = 0; i < allElements.length; i++) {
                    var el = allElements[i];
                    var posAttr = el.getAttribute('data-pos');
                    if (posAttr) {
                        var parts = posAttr.split('-');
                        var elLine = parseInt(parts[0], 10);
                        if (elLine === targetLine) {
                            el.classList.add('highlight-char');
                        }
                    }
                }
                var firstChar = document.querySelector('.highlight-char');
                if (firstChar) { firstChar.scrollIntoView(); }
            } catch (err) { }
        };

        window.scrollToSelection = function(startLine, startCol, endLine, endCol) {
            try {
                clearHighlight();
                var allElements = document.querySelectorAll('[data-pos]');
                for (var i = 0; i < allElements.length; i++) {
                    var el = allElements[i];
                    var posAttr = el.getAttribute('data-pos');
                    if (posAttr) {
                        var parts = posAttr.split('-');
                        var elLine = parseInt(parts[0], 10);
                        var elCol = parseInt(parts[1], 10);
                        if (startLine === endLine) {
                            if (elLine === startLine && elCol >= startCol && elCol <= endCol) {
                                el.classList.add('highlight-char');
                            }
                        } else {
                            if ((elLine === startLine && elCol >= startCol) || (elLine === endLine && elCol <= endCol) || (elLine > startLine && elLine < endLine)) {
                                el.classList.add('highlight-char');
                            }
                        }
                    }
                }
                var firstChar = document.querySelector('.highlight-char');
                if (firstChar) { firstChar.scrollIntoView(); }
            } catch (err) { }
        };

        window.addEventListener('load', function() {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage({ Type: 'previewLoaded', Data: 'loaded' });
                window.chrome.webview.postMessage({ Type: 'previewClick', Data: JSON.stringify({ line: 1, column: 1 }) });
            }
        });
    </script>
</body>
</html>
