<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: auto; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-size: 14px; line-height: 1.4; color: #333; background-color: #ffffff; padding: 12px; overflow-wrap: break-word; }
        h1, h2, h3, h4, h5, h6 { font-weight: 600; margin-top: 12px; margin-bottom: 8px; line-height: 1.3; }
        h1 { font-size: 1.5em; border-bottom: 1px solid #eee; padding-bottom: 0.2em; }
        h2 { font-size: 1.25em; border-bottom: 1px solid #eee; padding-bottom: 0.2em; }
        h3 { font-size: 1.1em; }
        h4 { font-size: 1em; }
        p { margin-top: 0; margin-bottom: 8px; }
        ul, ol { padding-left: 1.5em; margin-top: 0; margin-bottom: 8px; }
        li { margin-top: 2px; }
        code { font-family: 'Fira Code', 'Monaco', 'Consolas', monospace; font-size: 85%; padding: 0.15em 0.3em; background-color: rgba(27, 31, 35, 0.05); border-radius: 2px; }
        pre { padding: 12px; overflow: auto; font-size: 85%; line-height: 1.4; background-color: #f6f8fa; border-radius: 3px; margin-bottom: 8px; }
        pre code { padding: 0; background-color: transparent; border-radius: 0; }
        blockquote { margin: 4px 0 8px 0; padding: 4px 12px; color: #6a737d; border-left: 3px solid #dfe2e5; background-color: #f8f9fa; }
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        hr { height: 1px; padding: 0; margin: 12px 0; background-color: #e1e4e8; border: 0; }
        table { border-spacing: 0; border-collapse: collapse; margin-bottom: 8px; width: 100%; font-size: 13px; }
        table th, table td { padding: 4px 8px; border: 1px solid #dfe2e5; }
        table th { font-weight: 600; background-color: #f6f8fa; }
        table tr:nth-child(2n) { background-color: #f6f8fa; }
        img { max-width: 100%; box-sizing: content-box; }
        #content { min-height: 100%; }
        [data-line] { cursor: pointer; }
        [data-line]:hover { background-color: rgba(0, 102, 214, 0.1); }
        [data-pos] { cursor: pointer; border-bottom: 1px dashed transparent; }
        [data-pos]:hover { background-color: rgba(255, 193, 7, 0.3); border-bottom: 1px dashed #ffc107; }
        .highlight-char { background-color: rgba(255, 193, 7, 0.4) !important; border-radius: 2px; }
    </style>
</head>
<body>
    <div id='content'>Welcome to WeaveDoc Preview</div>
    <script>
        function sendMessage(msg) {
            if (window.chrome && window.chrome.webview && typeof window.chrome.webview.postMessage === 'function') {
                console.log('Using chrome.webview.postMessage:', msg);
                window.chrome.webview.postMessage(msg);
            } else if (window.external && typeof window.external.invoke === 'function') {
                console.log('Using external.invoke:', JSON.stringify(msg));
                window.external.invoke(JSON.stringify(msg));
            } else {
                console.log('No message API available');
            }
        }

        function testSendClick() {
            console.log('testSendClick called');
            sendMessage({ Type: 'debug', Data: 'Test button clicked' });
            sendMessage({ Type: 'previewClick', Data: JSON.stringify({ line: 5, column: 5 }) });
        }

        window.updateContent = function(html) {
            var contentDiv = document.getElementById('content');
            if (contentDiv) {
                contentDiv.innerHTML = html;

                var posElements = contentDiv.querySelectorAll('[data-pos]');
                sendMessage({ Type: 'debug', Data: 'Found ' + posElements.length + ' data-pos elements' });
                
                // 添加点击事件到每个 data-pos 元素
                posElements.forEach(function(el) {
                    el.addEventListener('click', function(e) {
                        var pos = el.getAttribute('data-pos');
                        console.log('data-pos element clicked:', pos);
                        sendMessage({ Type: 'debug', Data: 'Direct click on data-pos: ' + pos });
                    });
                });
            }
        };

        // 跟踪是否有活跃的选区
        var hasActiveSelection = false;

        // 获取选区的位置信息
        function getSelectionPositions() {
            var selection = window.getSelection();
            if (!selection || selection.rangeCount === 0) {
                return null;
            }

            var range = selection.getRangeAt(0);
            var selectedText = selection.toString();

            if (!selectedText || selectedText.trim() === '') {
                return null;
            }

            var startContainer = range.startContainer;
            var endContainer = range.endContainer;

            // 如果开始和结束容器不同，可能跨了多个元素
            if (startContainer !== endContainer) {
                console.log('Selection spans multiple elements, using start position only');
            }

            // 尝试找到包含起始位置的 data-pos 元素
            var startPosElement = startContainer.nodeType === Node.ELEMENT_NODE
                ? startContainer
                : startContainer.parentElement;

            var endPosElement = endContainer.nodeType === Node.ELEMENT_NODE
                ? endContainer
                : endContainer.parentElement;

            // 向上查找最近的 data-pos 元素
            while (startPosElement && !startPosElement.hasAttribute('data-pos')) {
                startPosElement = startPosElement.parentElement;
            }

            while (endPosElement && !endPosElement.hasAttribute('data-pos')) {
                endPosElement = endPosElement.parentElement;
            }

            if (!startPosElement || !endPosElement) {
                console.log('Could not find data-pos elements for selection');
                return null;
            }

            var startPos = startPosElement.getAttribute('data-pos');
            var endPos = endPosElement.getAttribute('data-pos');

            console.log('Selection start:', startPos, 'end:', endPos, 'text length:', selectedText.length);

            return {
                start: startPos,
                end: endPos,
                length: selectedText.length
            };
        }

        // 文本选择事件监听器
        document.addEventListener('mouseup', function(e) {
            var selection = getSelectionPositions();
            if (selection && selection.start) {
                console.log('Selection detected:', selection);
                sendMessage({ Type: 'debug', Data: 'Selection: ' + JSON.stringify(selection) });

                // 标记有活跃的选区
                hasActiveSelection = true;

                var startParts = selection.start.split('-');
                var endParts = selection.end ? selection.end.split('-') : startParts;

                var data = {
                    startLine: parseInt(startParts[0], 10) || 1,
                    startColumn: parseInt(startParts[1], 10) || 1,
                    endLine: parseInt(endParts[0], 10) || 1,
                    endColumn: parseInt(endParts[1], 10) || 1,
                    length: selection.length || 1
                };

                sendMessage({ Type: 'previewSelection', Data: JSON.stringify(data) });
            }
        });

        // 全局点击事件监听器
        document.addEventListener('click', function(e) {
            console.log('Document click event triggered');
            sendMessage({ Type: 'debug', Data: 'Document click triggered' });

            // 如果有活跃的选区，检查是否点击在选区外部
            var currentSelection = window.getSelection();
            var hasSelection = currentSelection && currentSelection.toString().trim() !== '';

            if (hasActiveSelection && hasSelection) {
                console.log('Ignoring click because there is an active selection');
                return;
            }

            var target = e.target;
            console.log('Click target:', target.tagName, target.className, target.id);
            
            // 检查是否点击了 data-pos 元素
            var posElement = target.closest('[data-pos]');
            if (posElement) {
                var posAttr = posElement.getAttribute('data-pos');
                console.log('Found data-pos element:', posAttr);
                sendMessage({ Type: 'debug', Data: 'Found data-pos: ' + posAttr });
                
                if (posAttr) {
                    var parts = posAttr.split('-');
                    var lineNumber = parseInt(parts[0], 10) || 1;
                    var colNumber = parseInt(parts[1], 10) || 1;
                    sendMessage({ Type: 'debug', Data: 'Sending previewClick: line=' + lineNumber + ', column=' + colNumber });
                    sendMessage({ Type: 'previewClick', Data: JSON.stringify({ line: lineNumber, column: colNumber }) });
                    return;
                }
            }
            
            // 检查是否点击了 data-line 元素
            var lineElement = target.closest('[data-line]');
            if (lineElement) {
                var lineNumber = parseInt(lineElement.getAttribute('data-line'), 10) || 1;
                console.log('Found data-line element:', lineNumber);
                sendMessage({ Type: 'debug', Data: 'Found data-line: ' + lineNumber });
                sendMessage({ Type: 'previewClick', Data: JSON.stringify({ line: lineNumber, column: 1 }) });
                return;
            }
            
            sendMessage({ Type: 'debug', Data: 'No data-pos or data-line found in click path' });
        }, true);

        function clearHighlight() {
            var highlighted = document.querySelectorAll('.highlight-char');
            highlighted.forEach(function(el) {
                el.classList.remove('highlight-char');
            });
        }

        window.scrollToLine = function(lineNumber) {
            try {
                clearHighlight();
                var targetLine = lineNumber;
                var allElements = document.querySelectorAll('[data-pos]');
                for (var i = 0; i < allElements.length; i++) {
                    var el = allElements[i];
                    var posAttr = el.getAttribute('data-pos');
                    if (posAttr) {
                        var parts = posAttr.split('-');
                        var elLine = parseInt(parts[0], 10);
                        if (elLine === targetLine) {
                            el.classList.add('highlight-char');
                        }
                    }
                }
                var firstChar = document.querySelector('.highlight-char');
                if (firstChar) { firstChar.scrollIntoView(); }
            } catch (err) { }
        };

        window.scrollToSelection = function(startLine, startCol, endLine, endCol) {
            try {
                clearHighlight();
                var allElements = document.querySelectorAll('[data-pos]');
                for (var i = 0; i < allElements.length; i++) {
                    var el = allElements[i];
                    var posAttr = el.getAttribute('data-pos');
                    if (posAttr) {
                        var parts = posAttr.split('-');
                        var elLine = parseInt(parts[0], 10);
                        var elCol = parseInt(parts[1], 10);
                        if (startLine === endLine) {
                            if (elLine === startLine && elCol >= startCol && elCol <= endCol) {
                                el.classList.add('highlight-char');
                            }
                        } else {
                            if ((elLine === startLine && elCol >= startCol) || (elLine === endLine && elCol <= endCol) || (elLine > startLine && elLine < endLine)) {
                                el.classList.add('highlight-char');
                            }
                        }
                    }
                }
                var firstChar = document.querySelector('.highlight-char');
                if (firstChar) { firstChar.scrollIntoView(); }
            } catch (err) { }
        };

        window.addEventListener('load', function() {
            sendMessage({ Type: 'previewLoaded', Data: 'loaded' });
        });
    </script>
</body>
</html>
