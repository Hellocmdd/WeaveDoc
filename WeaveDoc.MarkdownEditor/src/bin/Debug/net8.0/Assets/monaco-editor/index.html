<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco Editor</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #editor { width: 100%; height: 100%; }
    </style>
    <!-- 使用 CDN 加载 RequireJS -->
    <script src="https://cdn.jsdelivr.net/npm/requirejs@2.3.6/require.min.js"></script>
</head>
<body>
    <div id="editor"></div>
    <script>
        // 配置 RequireJS 从 CDN 加载 Monaco
        require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' }});

        require(['vs/editor/editor.main'], function() {
            var editor = monaco.editor.create(document.getElementById('editor'), {
                value: '# Hello Monaco!\n\nStart typing...',
                language: 'markdown',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                fontSize: 14,
                lineNumbers: 'on',
                wordWrap: 'on'
            });

            // 监听内容变化并发送给宿主 (C#)
            editor.onDidChangeModelContent(function() {
                try {
                    var content = editor.getValue();
                    if (window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage(JSON.stringify({ Type: 'contentChanged', Data: content }));
                    }
                } catch (e) {
                    console.error(e);
                }
            });

            // 监听来自宿主 (C#) 的消息
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.addEventListener('message', function(e) {
                    try {
                        var msg = e.data;
                        if (typeof msg === 'string') {
                            try { msg = JSON.parse(msg); } catch {}
                        }
                        if (msg && msg.Type === 'setContent') {
                            var current = editor.getValue();
                            if (current !== msg.Data) {
                                editor.setValue(msg.Data || '');
                            }
                        }
                    } catch (err) { console.error(err); }
                });
            }
            
            // 通知宿主编辑器已就绪
            if (window.chrome && window.chrome.webview) {
                 window.chrome.webview.postMessage(JSON.stringify({ Type: 'editorReady', Data: true }));
            }
        });
    </script>
</body>
</html>
